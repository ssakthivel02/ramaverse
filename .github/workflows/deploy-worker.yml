name: deploy-worker

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ramaverse-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN repository secret"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID repository secret"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package.json

      - name: Install Wrangler
        run: npm install

      - name: Validate Worker bundle
        run: npm run check

      - name: Deploy production Worker
        run: npm run deploy

      - name: Verify production API
        working-directory: .
        run: |
          curl -fsS "https://api-ramaverse.omsaravanabhava.org/api/v1/status?deploy=${GITHUB_SHA}" -o /tmp/status.json
          python - <<'PY'
          import json
          with open('/tmp/status.json', encoding='utf-8') as handle:
              body = json.load(handle)
          expected = {'status': 'ok', 'service': 'ramaverse-api', 'environment': 'production', 'version': '1.0.0', 'apiVersion': 'v1'}
          errors = {key: (value, body.get(key)) for key, value in expected.items() if body.get(key) != value}
          if errors:
              raise SystemExit(f'Post-deployment verification failed: {errors}')
          print('RamaVerse Worker deployment verified.')
          PY
